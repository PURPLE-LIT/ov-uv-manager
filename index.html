<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OV/UV Invoice Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e5e5e3;
      flex-wrap: wrap;
      gap: 10px;
    }
    .invoice-no { font-size: 13px; color: #666; }
    .invoice-no span { font-weight: 600; color: #1a1a1a; }
    .currency-select { display: flex; gap: 6px; }
    .currency-btn {
      padding: 5px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .currency-btn.active {
      background: #e8f0fe;
      color: #1a56db;
      border-color: #a4c0fb;
    }
    table.invoice-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.invoice-table th {
      text-align: center;
      font-weight: 600;
      color: #888;
      border-bottom: 1px solid #e5e5e3;
      padding: 6px 6px;
      font-size: 12px;
    }
    table.invoice-table td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #e5e5e3;
    }
    table.invoice-table td:first-child { text-align: left; font-weight: 600; }
    table.invoice-table input[type=number] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 8px;
      background: #fafafa;
      color: #1a1a1a;
      text-align: right;
      font-size: 13px;
    }
    table.invoice-table input[type=number]:focus {
      outline: none;
      border-color: #1a56db;
    }
    .amount-row td {
      font-weight: 600;
      background: #f9f9f7;
      font-size: 13px;
    }
    .divider { border: none; border-top: 1px solid #e5e5e3; margin: 1rem 0; }
    .received-row { display: flex; align-items: center; gap: 12px; margin-top: 0.75rem; }
    .received-row label { font-size: 13px; color: #666; white-space: nowrap; min-width: 90px; }
    .received-row input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      background: #fafafa;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 600;
    }
    .received-row input:focus { outline: none; border-color: #1a56db; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .metric {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem;
    }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    .metric-value.ov { color: #0a7227; }
    .metric-value.uv { color: #c0392b; }
    .formula-note { font-size: 11px; color: #aaa; margin-top: 4px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge.ov { background: #d1fae5; color: #065f46; }
    .badge.uv { background: #fee2e2; color: #991b1b; }
    .status-row {
      margin-top: 10px;
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-row .metric-label { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OV / UV Invoice Manager</h1>

    <div class="card">
      <div class="invoice-header">
        <div class="invoice-no">Invoice No. <span id="inv-no">—</span> &nbsp;|&nbsp; Date: <span id="inv-date"></span></div>
        <div class="currency-select">
          <button class="currency-btn active" onclick="setCurrency('USD')" id="btn-usd">USD $</button>
          <button class="currency-btn" onclick="setCurrency('EUR')" id="btn-eur">EUR €</button>
        </div>
      </div>

      <table class="invoice-table">
        <thead>
          <tr>
            <th style="text-align:left; width:65px;"></th>
            <th style="width:95px;">QTY</th>
            <th style="width:75px;">FOC</th>
            <th style="width:105px;">Unit Price</th>
            <th style="width:135px;">Total Amount (A)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Export</td>
            <td><input type="number" id="qty" placeholder="0" min="0" oninput="calc()" /></td>
            <td><input type="number" id="foc" placeholder="0" min="0" oninput="calc()" /></td>
            <td><input type="number" id="unit" placeholder="0.00" min="0" step="0.01" oninput="calc()" /></td>
            <td id="total-a" style="font-weight:600;">—</td>
          </tr>
          <tr class="amount-row">
            <td colspan="4" style="text-align:right; font-size:12px; color:#888;">Invoice Amount (A)</td>
            <td id="invoice-a-display">—</td>
          </tr>
        </tbody>
      </table>

      <hr class="divider" />

      <div class="received-row">
        <label>입금 금액 (B)</label>
        <span id="sym-b" style="color:#888; font-size:14px;">$</span>
        <input type="number" id="received" placeholder="0.00" min="0" step="0.01" oninput="calc()" />
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Invoice Amount A <span id="sym-a2" style="color:#aaa; font-size:11px;">($)</span></div>
        <div class="metric-value" id="m-a">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">입금 금액 B <span id="sym-b2" style="color:#aaa; font-size:11px;">($)</span></div>
        <div class="metric-value" id="m-b">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">OV 금액 <span class="badge ov" id="ov-badge" style="display:none">OV</span></div>
        <div class="metric-value ov" id="m-ov">—</div>
        <div class="formula-note">(B − A) × 97%</div>
      </div>
      <div class="metric">
        <div class="metric-label">UV 금액 <span class="badge uv" id="uv-badge" style="display:none">UV</span></div>
        <div class="metric-value uv" id="m-uv">—</div>
        <div class="formula-note">A − B</div>
      </div>
    </div>

    <div class="status-row">
      <div>
        <div class="metric-label">차액 (B − A)</div>
        <div class="metric-value" id="m-diff">—</div>
      </div>
      <div id="status-badge" style="font-size:13px; font-weight:600; color:#888;">입력값을 넣어주세요</div>
    </div>
  </div>

  <script>
    let currency = 'USD';

    function setCurrency(c) {
      currency = c;
      document.getElementById('btn-usd').classList.toggle('active', c === 'USD');
      document.getElementById('btn-eur').classList.toggle('active', c === 'EUR');
      const sym = c === 'USD' ? '$' : '€';
      document.getElementById('sym-b').textContent = sym;
      document.getElementById('sym-a2').textContent = '(' + sym + ')';
      document.getElementById('sym-b2').textContent = '(' + sym + ')';
      calc();
    }

    function fmt(val) {
      const sym = currency === 'USD' ? '$' : '€';
      return sym + ' ' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    document.getElementById('inv-date').textContent = today();
    document.getElementById('inv-no').textContent = 'KKI' + today().replace(/-/g, '').slice(2);

    function calc() {
      const qty = parseFloat(document.getElementById('qty').value) || 0;
      const unit = parseFloat(document.getElementById('unit').value) || 0;
      const A = qty * unit;
      const hasA = qty > 0 || unit > 0;

      document.getElementById('total-a').textContent = hasA ? fmt(A) : '—';
      document.getElementById('invoice-a-display').textContent = hasA ? fmt(A) : '—';
      document.getElementById('m-a').textContent = hasA ? fmt(A) : '—';

      const bInput = document.getElementById('received').value;
      const B = parseFloat(bInput);

      if (!isNaN(B) && bInput !== '') {
        document.getElementById('m-b').textContent = fmt(B);
        const diff = B - A;
        const diffEl = document.getElementById('m-diff');
        diffEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff);

        const ovEl = document.getElementById('m-ov');
        const uvEl = document.getElementById('m-uv');
        const statusEl = document.getElementById('status-badge');

        if (diff > 0) {
          ovEl.textContent = fmt(diff * 0.97);
          uvEl.textContent = '—';
          document.getElementById('ov-badge').style.display = 'inline-block';
          document.getElementById('uv-badge').style.display = 'none';
          statusEl.innerHTML = '<span style="color:#0a7227;">✓ Over Value (OV)</span>';
          diffEl.style.color = '#0a7227';
        } else if (diff < 0) {
          uvEl.textContent = fmt(A - B);
          ovEl.textContent = '—';
          document.getElementById('ov-badge').style.display = 'none';
          document.getElementById('uv-badge').style.display = 'inline-block';
          statusEl.innerHTML = '<span style="color:#c0392b;">⚠ Under Value (UV)</span>';
          diffEl.style.color = '#c0392b';
        } else {
          ovEl.textContent = '—';
          uvEl.textContent = '—';
          document.getElementById('ov-badge').style.display = 'none';
          document.getElementById('uv-badge').style.display = 'none';
          statusEl.innerHTML = '<span style="color:#888;">= 정확히 일치</span>';
          diffEl.style.color = '#1a1a1a';
        }
      } else {
        document.getElementById('m-b').textContent = '—';
        document.getElementById('m-diff').textContent = '—';
        document.getElementById('m-ov').textContent = '—';
        document.getElementById('m-uv').textContent = '—';
        document.getElementById('ov-badge').style.display = 'none';
        document.getElementById('uv-badge').style.display = 'none';
        document.getElementById('status-badge').textContent = '입력값을 넣어주세요';
        document.getElementById('m-diff').style.color = '#1a1a1a';
      }
    }
  </script>
</body>
</html>
